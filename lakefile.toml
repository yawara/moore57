name = "Moore57"
version = "0.1.0"
defaultTargets = ["Moore57"]

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.1"

# Enable mathlib's standard linter set (style.longLine at 100, style.refine,
# style.cases, style.cdot, flexible, hashCommand, oldObtain, unusedDecidableInType,
# etc.). The `weak.` prefix keeps olean caching consistent.
[leanOptions]
weak.linter.mathlibStandardSet = true
# TODO: cleanup section-variable hygiene per theorem (`omit [Fintype V] in ...`),
# then re-enable. Currently ~100 warnings across the project use a shared
# `variable` block where some theorems don't need every typeclass.
weak.linter.unusedSectionVars = false
weak.linter.unusedDecidableInType = false
weak.linter.unusedFintypeInType = false
# TODO: replace `simp [...]` with `simp only [...]` per occurrence by running
# `simp?` and pasting the suggested lemma set. 49 occurrences; not mechanical.
weak.linter.flexible = false

[[lean_lib]]
name = "Moore57"

[[lean_exe]]
name = "lintText"
srcDir = "bin"
supportInterpreter = true
